name: implement_flow
title: "!implement — Spec-Kit 기반 코드 구현"
description: |
  Spec-Kit 문서(spec/plan/tasks)를 바탕으로 실제 코드를 구현하는 메인 레시피입니다.

sub_recipes:
  - name: sub_dev_env_setup
    path: ../sub/sub_dev_env_setup.yaml
    description: "프로젝트 초기화 및 CI/CD(GitHub Actions) 설정"
  - name: sub_test_planner
    path: ../sub/sub_test_planner.yaml
    description: "Spec-Kit 기반 테스트 전략 및 테스트 케이스 설계"
  - name: sub_task_processor
    path: ../sub/sub_task_processor.yaml
    description: "03_tasks.md의 태스크를 순차적으로 구현"
  - name: sub_context_compaction
    path: ../sub/sub_context_compaction.yaml
    description: "구현 완료 내역을 session_context.md에 요약 및 압축"

instructions: |
  ### 개요
  `!plan`으로 생성된 Spec-Kit 문서를 바탕으로 실제 코드를 구현합니다.
  **사용자 응답 대기 없이 백그라운드 CI 환경에서 실행되므로, 절대로 대화를 중단하거나 승인을 요청하며 턴을 마치지 마십시오.**
  **항상 1개 이상의 Tool(도구)을 호출하여 모든 단계를 끝까지 연속으로 실행해야 합니다.**

  **자의적인 추가 기능은 절대 구현하지 않습니다.** 명세서에 정의된 내용만 구현하세요.

  ### [실행 순서]

  [필수 규칙 -- 모든 shell 명령어에 적용]
  파일 읽기, 존재 확인, 디렉토리 조회는 운영체제에 관계없이 항상 Python을 사용하세요.
  shell 내장 명령어(`if exist`, `cat`, `ls`, `mkdir -p` 등)는 사용하지 마세요.
  - 파일 읽기: `python -c "import pathlib; p=pathlib.Path('<path>'); print(p.read_text(encoding='utf-8') if p.exists() else 'NOT_FOUND')"`
  - 디렉토리 목록: `python -c "import pathlib; [print(p) for p in pathlib.Path('<dir>').rglob('*')]"`

  1. [컨텍스트 및 Spec-Kit 로드]
     - 인코딩 문제(한글 깨짐)를 방지하기 위해 반드시 Python으로 `context.json` 파일을 읽으세요:
       `python -c "import json; ctx=json.load(open('context.json', encoding='utf-8')); print(json.dumps(ctx, ensure_ascii=False, indent=2))"`
     - 절대로 `cat context.json` 으로 읽거나 파일 읽기용 `code_execution` (Goose built-in 외)을 사용하지 마십시오.
     - `docs/progress/session_context.md` 파일이 존재할 경우 Python으로 스캔하여, 프로젝트 전체를 뒤지지 않고도 최신 작업 컨텍스트를 파악합니다.
     - `docs/spec-kit/` 하위의 파일들을 아래 Python 명령으로 읽으세요:
       `python -c "import pathlib; p=pathlib.Path('docs/spec-kit/01_spec.md'); print(p.read_text(encoding='utf-8') if p.exists() else 'NOT_FOUND')"`
       `python -c "import pathlib; p=pathlib.Path('docs/spec-kit/02_plan.md'); print(p.read_text(encoding='utf-8') if p.exists() else 'NOT_FOUND')"`
       `python -c "import pathlib; p=pathlib.Path('docs/spec-kit/03_tasks.md'); print(p.read_text(encoding='utf-8') if p.exists() else 'NOT_FOUND')"`
     - 파일이 없으면 '!plan을 먼저 실행해야 합니다' 메시지를 기록하고 종료하세요.

  2. [환경 구축]
     - `sub_dev_env_setup`을 실행하여 프로젝트 구조 및 GitHub Actions 설정을 완료하세요.

  3. [테스트 전략 수립]
     - `sub_test_planner`를 실행하여 단위/통합 테스트 가이드를 작성하세요.

  4. [태스크별 구현 루프]
     - `03_tasks.md`의 `[ ]` 태스크를 순서대로 `sub_task_processor`로 처리하세요.
     - 각 태스크 완료 후 `03_tasks.md`를 `[x]`로 업데이트하세요.
     - 구현 중 명세와 다른 점이 생기면 즉시 관련 docs를 수정하세요.

  5. [최종 검증]
     - 전체 빌드 및 테스트를 수행하세요.
     - `README.md`를 포함한 결과물이 `01_spec.md`의 목표와 일치하는지 확인하세요.

  6. [구현 요약 -- 필수 완료 후 종료]
     - 이번 구현 작업에서 **작성/수정된 코드 및 파일 내역**을 한글로 요약하여 `docs/summary.md` 파일을 **반드시 새로 작성(덮어쓰기)** 하세요.
       요약에는 아래를 반드시 포함하세요:
       - 구현된 헥심 기능 목록 (태스크 ID 기준)
       - 새로 생성된 파일과 주요 수정 코드
       - 테스트 결과 (성공/실패 여부)
       - 발생한 트러블 및 해결책
     - **`docs/summary.md` 작성은 선택이 아니라 필수입니다. 이 파일이 없으면 Jira 댓글에 요약이 표시되지 않습니다.**
     - `sub_context_compaction`을 수행하여 `session_context.md`에 이번 구현 내역과 트러블슈팅/해결 사항을 갱신 및 기존 내용을 압축하세요.

  7. [전역 지도(.goosehints) 갱신]
     - 이번 구현으로 인해 새로운 파일이 생성되거나 폴더 구조가 변경되었다면, 반드시 프로젝트 루트의 `.goosehints` 맵핑 정보를 최신 상태로 업데이트하세요.

  8. [Git Commit 및 Push]
     - git commit 및 push를 실행하세요:
       `git add . && git commit -m "[{ticket_id}] !implement -- 구현 완료" && git push -u origin HEAD`
     - push 완료 후 아래 Python 명령으로 commit ID를 확인하세요:
       `python -c "import subprocess; r=subprocess.run(['git','rev-parse','--short','HEAD'],capture_output=True,text=True); print('Commit ID:', r.stdout.strip())"`

  9. [완료 보고]
     - 구현 완료 요약을 출력하고 종료합니다.
     - (Phase 4 연동 후) Jira 댓글로 결과를 보고합니다.

prompt: |
  context.json 과 docs/spec-kit/ 문서를 먼저 읽고 즉시 구현을 시작하세요.
  만약 중간에 결과를 보고하거나 다음 단계를 예고해야 하더라도, 절대로 도구(Tool) 호출 없이 텍스트만 출력하지 마십시오. 단 한 번이라도 도구 호출 없이 텍스트만 응답하면 즉시 파이프라인이 에러 처리되어 강제 종료됩니다. 
  "~작업을 시작하겠습니다"라고 말하지 말고 묵묵히 바로 명령어/도구를 실행하세요.
  
  현재 디렉토리는 대상 프로젝트의 소스 루트(source/)입니다.
