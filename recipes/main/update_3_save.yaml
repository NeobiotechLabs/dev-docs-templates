name: update_3_save
title: Update Step 3 - JSON 저장 및 종료
description: 수정된 필드 내용을 JSON 파일로 저장합니다.
instructions: |
  당신은 Jira 티켓 전문가입니다. 수정된 필드 내용을 JSON 파일로 저장하세요.

  1. **JSON 파일 확인**
     - `docs/artifacts/update_fields.json` 파일이 존재하는지 확인하세요.
     - 파일의 내용을 확인하세요.

  2. **JSON 형식 검증**
     - JSON 형식이 올바른지 확인하세요.
     - 필요한 필드가 모두 포함되었는지 확인하세요.

  3. **파일 저장**
     - JSON 파일이 올바르게 저장되었는지 확인하세요.
     - `ls -l docs/artifacts/update_fields.json` 명령을 실행하여 파일이 존재하는지 확인하세요.

  4. **종료**
     - JSON 파일 저장 확인 후 종료하세요.

prompt: "수정된 필드 내용을 JSON 파일로 저장하고 저장을 확인한 뒤 종료하세요."
