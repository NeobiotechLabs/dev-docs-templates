name: plan_flow
title: "!plan — Jira 티켓 기반 기획 문서 생성"
description: |
  Jira 티켓의 context.json을 읽어 PRD, SRS, 아키텍처, 상세 설계, Spec-Kit(Spec/Plan/Tasks)를
  자동 생성하는 메인 레시피입니다. 사용자 인터뷰 없이 context.json에서 직접 정보를 읽어 시작합니다.

sub_recipes:
  - name: sub_prd_generator
    path: ../sub/sub_prd_generator.yaml
    description: "PRD 생성 서브 레시피"
  - name: sub_srs_analyzer
    path: ../sub/sub_srs_analyzer.yaml
    description: "SRS 분석 및 생성 서브 레시피"
  - name: sub_arch_designer
    path: ../sub/sub_arch_designer.yaml
    description: "시스템 아키텍처 설계 서브 레시피"
  - name: sub_detail_designer
    path: ../sub/sub_detail_designer.yaml
    description: "상세 설계(HLD/LLD) 서브 레시피"
  - name: sub_spec_kit_spec
    path: ../sub/sub_spec_kit_spec.yaml
    description: "Spec-Kit 명세서(Spec) 생성"
  - name: sub_spec_kit_plan
    path: ../sub/sub_spec_kit_plan.yaml
    description: "Spec-Kit 기술 계획(Plan) 생성"
  - name: sub_spec_kit_tasks
    path: ../sub/sub_spec_kit_tasks.yaml
    description: "Spec-Kit 태스크(Tasks) 분할"

instructions: |
  ### 개요
  Jira 티켓의 컨텍스트를 기반으로 전체 SDLC 문서를 자동 생성합니다.
  **사용자 응답 대기 없이 백그라운드 CI 환경에서 실행되므로, 절대로 대화를 중단하거나 승인을 요청하며 턴을 마치지 마십시오.**
  **항상 1개 이상의 Tool(도구)을 호출하여 모든 단계를 끝까지 연속으로 실행해야 합니다.**

  모든 정보는 `context.json`에서 읽습니다.

  ### [실행 순서]

  1. [컨텍스트 로드]
     - Windows 환경의 인코딩 문제(한글 깨짐)를 방지하기 위해 **반드시** 다음과 같은 Python 명령어나 `text_editor` 도구를 사용하여 `context.json` 파일을 UTF-8로 읽으세요.
       `python -c "open('context.json', encoding='utf-8').read()"`
     - ⚠️ 절대로 `cat context.json` 이나 파일 읽기용 `code_execution` (Goose built-in 외)을 사용하지 마십시오.
       - ticket_id, summary, description, command, command_args, attachments 필드를 확인합니다.
     - 첨부파일(`attachments` 경로)이 있으면 동일한 방식으로 각 파일을 읽어 내용을 파악하세요.

  2. [작업 공간 초기화]
     - `mkdir -p docs/spec-kit` 를 실행하세요.

  3. [PRD 생성]
     - context.json의 summary와 description을 바탕으로 `sub_prd_generator`를 실행하세요.
     - 산출물: `docs/01_PRD.md`

  4. [SRS 생성]
     - PRD를 기반으로 `sub_srs_analyzer`를 실행하세요.
     - 산출물: `docs/02_SRS.md`

  5. [아키텍처 설계]
     - `sub_arch_designer`를 실행하세요.
     - 산출물: `docs/03_Architecture.md`

  6. [상세 설계]
     - `sub_detail_designer`를 실행하세요.
     - 산출물: `docs/04_Detailed_Design.md`

  7. [Spec-Kit 생성]
     - `sub_spec_kit_spec`, `sub_spec_kit_plan`, `sub_spec_kit_tasks` 순서로 실행하세요.
     - 산출물: `docs/spec-kit/01_spec.md`, `02_plan.md`, `03_tasks.md`

  8. [작업 요약 및 Git Commit/Push]
     - 이번 작업에서 변경된 핵심 내용(어떤 점이 업데이트 되었는지)을 한글로 요약하여 `docs/summary.md` 파일로 작성하세요.
     - `git add docs/ && git commit -m "[{ticket_id}] !plan — 기획 문서 생성" && git push -u origin HEAD` 명령을 실행하세요.

  9. [질문 게시]
     - 만약 진행에 필요한 핵심 정보가 부족하다면, 임의로 지어내지 말고 `.agents/skills/jira-commenter/SKILL.md`를 참조하여 질문 댓글을 게시한 후 세션을 종료하세요.
       - `--type question --summary "{질문 내용}" --session {ticket_id}`

prompt: |
  context.json 파일을 먼저 읽어 Jira 티켓 정보를 파악하고 즉시 기획 산출물 생성을 시작하세요.
  만약 중간에 결과를 보고하거나 다음 단계를 예고해야 하더라도, 절대로 도구(Tool) 호출 없이 텍스트만 출력하지 마십시오. 단 한 번이라도 도구 호출 없이 텍스트만 응답하면 즉시 파이프라인이 에러 처리되어 강제 종료됩니다. 
  "~작업을 시작하겠습니다"라고 말하지 말고 묵묵히 즉시 다음 레시피나 명령어를 실행하세요.
  
  현재 디렉토리는 대상 프로젝트의 소스 루트(source/)입니다.
  모든 산출물은 docs/ 하위에 저장하세요.

  [요구사항 파악 순서]
  1. command_args 필드 확인 → 비어있지 않으면 이것이 사용자의 핵심 요청입니다
  2. description 필드 확인 → command_args가 없으면 이것을 요구사항으로 사용
  3. 둘 다 비어있으면 "요구사항 없음"을 docs/ERROR.md에 기록하고 종료

  command_args와 description이 모두 있으면 command_args를 우선합니다.
