name: plan_flow
title: "!plan — Jira 티켓 기반 기획 문서 생성"
description: |
  Jira 티켓의 context.json을 읽어 티켓 유형(issue_type)에 따라 적절한 깊이(Depth)의
  기획 산출물을 자동 생성하는 메인 레시피입니다.
  - Epic/Story(글로벌 영향 있음): PRD 업데이트 → Spec-Kit 3종
  - Epic/Story(글로벌 영향 없음): Spec-Kit 3종만
  - Task/Sub-task: Spec-Kit 3종만 (전역 문서 생략)
  - Bug/Hotfix: 01_spec.md만 최소 생성

sub_recipes:
  - name: sub_prd_generator
    path: ../sub/sub_prd_generator.yaml
    description: "PRD 생성 서브 레시피"
  - name: sub_srs_analyzer
    path: ../sub/sub_srs_analyzer.yaml
    description: "SRS 분석 및 생성 서브 레시피"
  - name: sub_arch_designer
    path: ../sub/sub_arch_designer.yaml
    description: "시스템 아키텍처 설계 서브 레시피"
  - name: sub_detail_designer
    path: ../sub/sub_detail_designer.yaml
    description: "상세 설계(HLD/LLD) 서브 레시피"
  - name: sub_spec_kit_spec
    path: ../sub/sub_spec_kit_spec.yaml
    description: "Spec-Kit 명세서(Spec) 생성"
  - name: sub_spec_kit_plan
    path: ../sub/sub_spec_kit_plan.yaml
    description: "Spec-Kit 기술 계획(Plan) 생성"
  - name: sub_spec_kit_tasks
    path: ../sub/sub_spec_kit_tasks.yaml
    description: "Spec-Kit 태스크(Tasks) 분할"
  - name: sub_context_compaction
    path: ../sub/sub_context_compaction.yaml
    description: "컨텍스트 압축 및 요약 업데이트"

instructions: |
  ### 개요
  Jira 티켓의 컨텍스트를 기반으로, 티켓 유형에 따라 최적의 깊이로 SDLC 문서를 자동 생성합니다.
  **사용자 응답 대기 없이 백그라운드 CI 환경에서 실행되므로, 절대로 대화를 중단하거나 승인을 요청하며 턴을 마치지 마십시오.**
  **항상 1개 이상의 Tool(도구)을 호출하여 모든 단계를 끝까지 연속으로 실행해야 합니다.**

  모든 정보는 `context.json`에서 읽습니다.

  ### [실행 순서]

  [필수 규칙 — 모든 shell 명령어에 적용]
     - 파일 읽기, 존재 확인, 디렉토리 목록 조회는 운영체제에 관계없이 항상 Python을 사용하세요.
       파일 읽기: `python3 -c "import pathlib; p=pathlib.Path('<path>'); print(p.read_text(encoding='utf-8') if p.exists() else 'NOT_FOUND')"`
       디렉토리 목록: `python3 -c "import pathlib; [print(p.name) for p in sorted(pathlib.Path('docs').rglob('*.md'))[:20]]  # 최대 20개 파일만 조회"` 
     - shell 내장 명령어(`if exist`, `cat`, `ls`, `mkdir -p` 등)는 플랫폼 호환성 문제가 있으므로 사용하지 마세요.

  1. [컨텍스트 로드]
     - 인코딩 문제(한글 깨짐)를 방지하기 위해 반드시 아래와 같이 Python으로 읽으세요:
       `python3 -c "import json; ctx=json.load(open('context.json', encoding='utf-8')); print(json.dumps(ctx, ensure_ascii=False, indent=2))"`
     - 절대로 `cat context.json` 이나 파일 읽기용 `code_execution` (Goose built-in 외)을 사용하지 마십시오.
     - 다음 필드를 반드시 확인하세요:
       - `ticket_id`, `summary`, `description`, `command`, `command_args`
       - **`issue_type`** — 티켓 유형 판단의 핵심 필드 (예: "Epic", "Story", "Task", "Bug")
     - 첨부파일(`attachments` 경로)이 있으면 동일한 방식으로 각 파일을 읽어 내용을 파악하세요.
     - `docs/progress/session_context.md` 가 존재한다면 **반드시 읽어** 기존 컨텍스트 맥락을 파악하세요.

  2. [작업 공간 초기화]
     - `python3 -c "import pathlib; pathlib.Path('docs/spec-kit').mkdir(parents=True, exist_ok=True); print('docs/spec-kit ready')"`

  3. [전역 지도(.goosehints) 확인]
     - 아래 Python 명령으로 `.goosehints` 파일의 존재 여부와 내용을 확인하세요:
       `python3 -c "import pathlib; p=pathlib.Path('.goosehints'); print(p.read_text(encoding='utf-8') if p.exists() else 'NOT_FOUND')"`
     - **중요**: .goosehints 파일이 없거나 내용이 부실하더라도 **디렉토리 스캔을 수행하지 마세요**. CI 환경에서는 매번 새로운 workspace가 생성되므로 스캔 로그 폭발을 방지하기 위해 스캔을 건너뛰고 바로 다음 단계로 진행하세요.

  4. [티켓 유형(issue_type) 분류 — Task 7.3 핵심]

     context.json에서 읽은 `issue_type` 값으로 아래 카테고리를 판단하세요:

     | issue_type 값 예시                              | 판단 카테고리 |
     |------------------------------------------------|-------------|
     | "Epic"                                         | epic        |
     | "Story", "User Story"                           | story       |
     | "Task", "Sub-task", "Technical Task"            | task        |
     | "Bug", "Hotfix", "Defect", "Incident"           | bug         |
     | 그 외                                           | task (기본) |

     판단한 카테고리에 따라 아래 5~7단계의 실행 경로를 선택합니다.

  5. [Bug/Hotfix 경로 -- 최소 생성]
     - **카테고리가 `bug`인 경우만 이 단계를 실행합니다.**
     - `sub_spec_kit_spec` 서브레시피만 실행하여 `docs/spec-kit/01_spec.md`를 생성하세요.
     - `docs/spec-kit/02_plan.md`, `03_tasks.md`는 생성하지 않습니다.
     - 전역 문서(`01_PRD.md`, `02_SRS.md` 등)는 절대 수정하지 않습니다.
     - **이 단계 완료 후 8단계(요약)로 바로 이동하세요.**

  6. [Task/Sub-task 경로 -- Spec-Kit 3종 생성 또는 갱신]
     - **카테고리가 `task`인 경우만 이 단계를 실행합니다.**

     6-A. [spec-kit 기존 파일 유무 판단 및 신규 요구사항 비교 -- 반드시 실행]
       - `docs/spec-kit/01_spec.md`이 존재하면 Python으로 챜 3000자을 읽으세요:
         `python3 -c "import pathlib; p=pathlib.Path('docs/spec-kit/01_spec.md'); print(p.read_text(encoding='utf-8')[:3000] if p.exists() else 'NOT_FOUND')"`
       - 읽은 내용과 `command_args`를 비교하여 아래 중 하나라도 해당하면 **갱신 필요**로 판단하세요:
         * `command_args`에 언급된 기능이 현재 spec에 없거나 서술이 전혀 다릅니다
         * `command_args`가 새로운 시나리오, 엄거조건, 동작 법칙을 요청합니다
       - **파일이 존재한다고 해서 `command_args`의 신규 요구사항을 묵시하면 안 됩니다. 이메일 `!plan`은 새 요청이므로 반드시 반영 여부를 판단하세요.**

     6-B. [sub 레시피 실행]
       - `sub_spec_kit_spec` (신규 작성 또는 `command_args` 반영 갱신)
       - `sub_spec_kit_plan` (신규 작성 또는 spec 변경 사항 반영 갱신)
       - `sub_spec_kit_tasks` (신규 작성 또는 plan 변경 사항 반영 갱신)
     - 전역 문서(`01_PRD.md`, `02_SRS.md` 등)는 절대 수정하지 않습니다.
     - **이 단계 완료 후 8단계(요약)로 바로 이동하세요.**

  7. [Epic/Story 경로 -- 글로벌 문서 영향 판단 후 결정]
     - **카테고리가 `epic` 또는 `story`인 경우만 이 단계를 실행합니다.**

     7-A. [2단계 Depth 판단 — 전역 문서 영향 여부 분석]
       - 아래 전역 문서가 존재하면 읽어서 현재 내용을 파악하세요:
         * `docs/01_PRD.md` (존재 시)
         * `docs/02_SRS.md` (존재 시)
         * `docs/03_Architecture.md` (존재 시)
       - 이번 티켓의 내용(`summary`, `description`, `command_args`)과 비교하여 판단하세요:

         **전역 문서 업데이트 필요 조건 (아래 중 하나라도 해당하면 "영향 있음"):**
         - 기존 PRD/SRS에 없는 **신규 기능 영역 또는 모듈** 추가
         - **핵심 데이터 모델이나 API 계약** 변경
         - **전체 아키텍처 또는 기술 스택** 수준의 결정
         - 기존 문서가 **존재하지 않는** 경우 (최초 기획)

         **전역 문서 유지 조건 (아래에 해당하면 "영향 없음"):**
         - 기존 기능의 UI/UX 개선이나 버그 수정 수준
         - 기존 PRD/SRS 범위 내에 이미 포함된 기능 세부 구현
         - 단순 성능 최적화나 리팩토링

     7-B. [영향 있음 → 전역 문서 업데이트 + Spec-Kit 3종]
       - `sub_prd_generator` 를 실행하여 `docs/01_PRD.md`를 생성/업데이트하세요.
       - 필요 시 `sub_srs_analyzer`, `sub_arch_designer`, `sub_detail_designer`를 순서대로 실행하세요.
         (단, 아키텍처 파일이 이미 존재하고 변경 사항이 작다면 delta 업데이트만 수행하세요)
       - `sub_spec_kit_spec`, `sub_spec_kit_plan`, `sub_spec_kit_tasks` 순서로 실행하세요.

     7-C. [영향 없음 → Spec-Kit 3종만]
       - 전역 문서를 수정하지 않습니다.
       - `sub_spec_kit_spec`, `sub_spec_kit_plan`, `sub_spec_kit_tasks` 순서로 실행하세요.

  8. [작업 요약 -- 필수 완료 후 종료]
     이번 기획 작업의 핵심 내용을 아래 두 가지 방식으로 반드시 보고하세요.

     [8-A] docs/summary.md 파일 작성 (필수 -- 가장 먼저 수행)
     Python으로 아래 형식의 내용을 `docs/summary.md`에 저장하세요:
     ```python
     import pathlib
     content = """## {ticket_id} !plan 작업 요약

     ### 실행 경로
     - 티켓 유형: {issue_type}
     - 선택된 경로: (bug/task/epic 중)

     ### 생성된 산출물
     - docs/spec-kit/01_spec.md
     - docs/spec-kit/02_plan.md  (해당 시)
     - docs/spec-kit/03_tasks.md (해당 시)

     ### 전역 문서 갱신
     - (갱신 여부 및 대상 파일)
     """
     pathlib.Path("docs/summary.md").write_text(content, encoding="utf-8")
     ```
     실제 내용으로 채워서 저장하세요. 이 파일은 Runner가 Jira 댓글로 자동 게시합니다.

     [8-B] Jira 직접 게시 시도 (추가 -- 8-A 이후 수행)
     .agents/skills/jira-commenter/SKILL.md를 참조하여 Jira에도 직접 댓글을 게시하세요:
       python3 .agents/skills/jira-commenter/scripts/post_comment.py \
         --type done \
         --ticket {ticket_id} \
         --summary "[!plan 완료] 티켓유형: {issue_type}, 생성파일: 01_spec.md/02_plan.md/03_tasks.md, 전역문서: (갱신여부)"

     - **8-A(파일 작성)는 절대 생략 불가입니다. 8-B 실패 시에도 8-A로 보고됩니다.**
     - `sub_context_compaction`을 수행하여 `session_context.md`에 이번 기획 방향을 짧게 갱신/압축하세요.
     - git commit 및 push를 실행하세요:
       `git add docs/ .goosehints && git commit -m "[{ticket_id}] !plan -- 기획 문서 생성 ({issue_type})" && git push -u origin HEAD`
     - push 완료 후 아래 Python 명령으로 commit ID를 확인하세요:
       `python3 -c "import subprocess; r=subprocess.run(['git','rev-parse','--short','HEAD'],capture_output=True,text=True); print('Commit ID:', r.stdout.strip())"`


  9. [질문 게시]
     - 만약 진행에 필요한 핵심 정보가 부족하다면, 임의로 지어내지 말고 `.agents/skills/jira-commenter/SKILL.md`를 참조하여 질문 댓글을 게시한 후 세션을 종료하세요.
       - `--type question --summary "{질문 내용}" --session {ticket_id}`

prompt: |
  context.json 파일을 먼저 읽어 Jira 티켓 정보와 issue_type을 파악하고, 티켓 유형에 맞는 경로로 기획 산출물 생성을 즉시 시작하세요.
  만약 중간에 결과를 보고하거나 다음 단계를 예고해야 하더라도, 절대로 도구(Tool) 호출 없이 텍스트만 출력하지 마십시오. 단 한 번이라도 도구 호출 없이 텍스트만 응답하면 즉시 파이프라인이 에러 처리되어 강제 종료됩니다.
  "~작업을 시작하겠습니다"라고 말하지 말고 묵묵히 즉시 다음 레시피나 명령어를 실행하세요.
  
  현재 디렉토리는 대상 프로젝트의 소스 루트(source/)입니다.
  모든 산출물은 docs/ 하위에 저장하세요.

  [요구사항 파악 순서]
  1. command_args 필드 확인 → 비어있지 않으면 이것이 사용자의 핵심 요청입니다
  2. description 필드 확인 → command_args가 없으면 이것을 요구사항으로 사용
  3. 둘 다 비어있으면 "요구사항 없음"을 docs/ERROR.md에 기록하고 종료

  command_args와 description이 모두 있으면 command_args를 우선합니다.
