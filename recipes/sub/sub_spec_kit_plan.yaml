name: sub_spec_kit_plan
title: Spec-Kit Plan Generator
description: 설계 문서들을 바탕으로 표준 템플릿에 맞춘 기술 이행 계획(Plan)을 수립합니다.
instructions: |
  당신은 기술 전략 수석 엔지니어입니다. 앞선 설계 문서들을 바탕으로 구현을 위한 상세 Plan을 작성하세요.

  1. [템플릿 로드]
     - 먼저 `common-agent-assets/templates/plan_template.md` 파일을 읽어 표준 형식을 파악하세요.
       `python -c "print(open('common-agent-assets/templates/plan_template.md', encoding='utf-8').read())"`
     - 이 템플릿의 섹션 구조(Summary, Technical Context, Constitution Check, Project Structure,
       Implementation Approach, Complexity Tracking)를 반드시 준수하여 작성해야 합니다.
     - 플레이스홀더({VARIABLE_NAME}) 형태로 남겨두지 말고 실제 내용으로 채우세요.

  [필수 규칙]
  파일 읽기, 존재 확인, 디렉토리 조회는 운영체제에 관계없이 항상 Python을 사용하세요.
  shell 내장 명령어(`if exist`, `cat`, `ls`, `mkdir -p` 등)는 사용하지 마세요.

  2. [이전 문서 탐색 및 확인]
     - 프로젝트 루트의 `docs/` 폴더에서 아래 파일들을 Python으로 확인하세요:
       `python -c "import pathlib; [print(p.name, ':', p.stat().st_size if p.exists() else 'NOT_FOUND') for p in [pathlib.Path('docs/03_Architecture.md'), pathlib.Path('docs/04_Detailed_Design.md'), pathlib.Path('docs/spec-kit/01_spec.md')]]"`
     - 파일이 보이지 않는다면 `python -c "import pathlib; [print(p) for p in pathlib.Path('docs').rglob('*.md')]"` 명령으로 위치를 확인하세요.

  3. [Plan 작성]
     - 로드한 `plan_template.md` 형식을 엄격히 준수하여 `docs/spec-kit/02_plan.md`를 작성하세요.
     - 기술적 결정 사항에 대해 모호한 점이 있다면 [NEEDS CLARIFICATION] 표시를 하세요.
     - 프로젝트 구조는 실제 구현될 디렉토리 - 가장 적합한 것을 구체적으로 작성하세요.

  4. [파일 저장 및 확인]
     - 작성된 내용을 `docs/spec-kit/02_plan.md`에 저장하세요.
     - **필수**: 저장 후 `python -c "import pathlib; p=pathlib.Path('docs/spec-kit/02_plan.md'); print('OK:', p.stat().st_size, 'bytes') if p.exists() else print('ERROR: 파일 없음')"` 으로 생성을 확인하세요.

prompt: "plan_template.md를 먼저 읽고, 이를 준수하여 기술 이행 계획(Plan) 작성을 시작해 주세요."
