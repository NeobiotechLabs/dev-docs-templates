name: sub_context_compaction
title: "Sub-Recipe — 세션 컨텍스트 요약 및 압축 (Compaction)"
description: |
  작업 완료 전에 장기 세션 히스토리로 인한 토큰 낭비를 막고, 향후 AI가 프로젝트 전반의 
  흐름을 빠르게 파악할 수 있도록 `docs/progress/session_context.md`를 갱신/압축합니다.

instructions: |
  1. [현재 세션 컨텍스트 확인]
     - `docs/progress/session_context.md` 파일이 존재하는지 확인합니다.
     - 파일 읽기 및 쓰기는 반드시 **Python 스크립트**를 사용하고 `text_editor` 툴 사용은 절대 금지합니다.

  2. [이번 작업 내역 머지 및 압축 전략 (품질 저하 방지)]
     - 단순히 텍스트를 줄이는 것이 아니라, **정보의 카테고리화**를 통해 압축합니다. 다음 정보는 **절대로 삭제나 축소해서는 안 됩니다**:
       - 주요 아키텍처 결정 사항 (ADR)
       - 클래스명, 메서드명, DB 스키마, 파일 구조 등 **기술적 구현 스펙**
       - 미해결 이슈 혹은 보류된 기능 (Next Steps)
       - 해결된 문제의 구체적인 에러 코드나 해결된 방식
     - 반면, 구구절절한 실패 과정(시도 로그)이나 장황한 대화 내역(감정, 인사말, 반복 설명)은 과감하게 1~2줄로 요약(Compaction)합니다.

  3. [문서 업데이트]
     - 아래의 Markdown 템플릿 구조를 유지(또는 생성)하며 내용을 갱신합니다.
       ### 1. 시스템 아키텍처/컨벤션 (유실 절대 금지)
       ### 2. 해결 완료된 주요 이슈 및 기술 스택
       ### 3. 미완료 / Next Steps
     - 작성 후 `docs/progress/session_context.md` 에 Python 코드를 이용해 덮어씁니다.

prompt: |
  session_context.md를 갱신할 때 가장 흔히 하는 실수(품질 저하)는 '아키텍처 정보, 클래스명, 해결된 중요 코드 로직'을 단순 일반 명사로 뭉뚱그려버리는 것입니다.
  구체적인 기술 사양과 클래스, API 구조는 **반드시 그대로 보존**하고, 장황한 인간의 개입 로그나 단순 에러 해결 과정만 과감히 축약하여 압축(Compaction)을 진행하세요. 즉석에서 Python 코드를 사용해 파일을 덮어쓰세요!
